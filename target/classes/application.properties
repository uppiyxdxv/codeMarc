server.port=${PORT:8080}
spring.application.name=codearena-classconnect

# H2 in-memory for development (switch to MySQL for production)
spring.datasource.url=jdbc:h2:mem:platformdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=CodeArenaClassConnectSecretKey2024MustBeAtLeast256BitsLongForHS256
app.jwt.expiration-ms=86400000

# File upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=uploads

# Judge0 API (code execution sandbox)
app.judge0.url=https://api.judge0.com
app.judge0.api-key=
