services:
  - type: web
    name: codearena
    env: java
    region: oregon
    plan: free
    branch: master
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/codearena-classconnect-1.0.0.jar
    healthCheckPath: /
    envVars:
      - key: JAVA_VERSION
        value: 17
      - key: SPRING_PROFILES_ACTIVE
        value: prod
